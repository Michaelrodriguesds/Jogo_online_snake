<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Multiplayer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐍</text></svg>">
</head>
<body>
    <!-- ========== CANVAS ========== -->
    <canvas id="gameCanvas"></canvas>

    <!-- ========== MENU ÚNICO ========== -->
    <div id="menu" class="menu-unified">
        <canvas id="menuCanvas" class="menu-snake-bg"></canvas>
        
        <div class="menu-content">
            <h1 class="game-title">🐍 SNAKE<br/>MULTIPLAYER</h1>
            
            <!-- Botões do Jogo -->
            <button id="soloBtn" class="menu-btn">🎮 Jogar Solo</button>
            <button id="multiBtn" class="menu-btn">👥 Multiplayer</button>
            
            <!-- Demais Conteúdos -->
            <a href="instructions.html" class="menu-btn info-btn">📖 Como Jogar</a>
            <a href="feedback.html" class="menu-btn info-btn">💡 Dicas & Suporte</a>
            <a href="reviews.html" class="menu-btn info-btn">⭐ Avaliações</a>
            <a href="contact.html" class="menu-btn info-btn">📞 Contatos</a>
        </div>
    </div>

    <!-- Menu Multiplayer -->
    <div id="multiMenu" class="menu-container">
        <h2>👥 Multiplayer</h2>
        <input id="nameInput" type="text" placeholder="Seu Nome" maxlength="15">
        <button id="createRoomBtn" class="menu-btn">🆕 Criar Sala</button>
        <input id="pinInput" type="text" placeholder="PIN da Sala" maxlength="4" inputmode="numeric">
        <button id="joinRoomBtn" class="menu-btn">🔗 Entrar na Sala</button>
        <button id="backFromMulti" class="menu-btn back-btn">← Voltar</button>
    </div>

    <!-- Lobby -->
    <div id="lobby" class="menu-container">
        <h2>🏠 Lobby</h2>
        <div id="pinDisplay"></div>
        <div id="playersList"></div>
        <button id="readyBtn" class="menu-btn">✅ Pronto</button>
        <button id="backFromLobby" class="menu-btn back-btn">← Voltar</button>
    </div>

    <!-- UI do Jogo -->
    <div id="scoreboard"></div>
    <div id="messages"></div>
    <div id="timerDisplay"></div>
    
    <!-- Botão QUIT -->
    <button id="quitBtn" class="quit-btn">🚪 SAIR</button>

    <!-- Controles Mobile -->
    <div id="mobileControls" class="mobile-controls"></div>

    <script src="client.js"></script>
</body>
</html>
